<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W-Studio | Todo LM - Program</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">	
	<link rel="icon" href="resource/icon.ico">
    <style>
        :root {
            --bg:      #080a0f;
            --surface: #0e1117;
            --card:    #111520;
            --border:  #1c2030;
            --accent:  #00d2b4;
            --accent2: #5078ff;
            --danger:  #ff3c5a;
            --success: #00e896;
            --warn:    #ffb340;
            --purple:  #a78bfa;
            --orange:  #fb923c;
            --ignore:  #3a4060;
            --text-hi:  #eef0f6;
            --text-mid: #8890aa;
            --text-dim: #3a4060;
            --mono: 'JetBrains Mono', monospace;
            --sans: 'Outfit', sans-serif;
        }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: var(--sans); background: var(--bg); color: var(--text-hi); min-height: 100vh; }
        body::before {
            content: ''; position: fixed; inset: 0;
            background-image:
                linear-gradient(rgba(0,210,180,.025) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,210,180,.025) 1px, transparent 1px);
            background-size: 40px 40px; pointer-events: none; z-index: 0;
        }

        /* ── Nav ─────────────────────────────────────────────────── */
        .topbar {
            position: sticky; top: 0; z-index: 200;
            background: rgba(8,10,15,.92); backdrop-filter: blur(16px);
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center;
            padding: 0 28px; height: 58px; gap: 16px;
        }
        .logo { font-family: var(--mono); font-size: 14px; font-weight: 700;
            color: var(--accent); letter-spacing: 2px; text-decoration: none; }
        .logo span { color: var(--text-dim); }
        .topbar-sep { width: 1px; height: 22px; background: var(--border); }
        .page-label { font-family: var(--mono); font-size: 11px;
            letter-spacing: 2px; color: var(--text-dim); text-transform: uppercase; }
        .topbar-right { margin-left: auto; display: flex; align-items: center; gap: 8px; }

        /* Stat chips in topbar */
        .stat-chip {
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            padding: 4px 10px; border-radius: 6px; letter-spacing: .5px;
            display: flex; align-items: center; gap: 5px; white-space: nowrap;
        }
        .stat-chip.expired { background: rgba(255,60,90,.10); color: var(--danger); border: 1px solid rgba(255,60,90,.18); }
        .stat-chip.ignored { background: rgba(58,64,96,.20);  color: var(--text-dim); border: 1px solid rgba(58,64,96,.35); }
        .stat-chip .chip-n { font-size: 13px; }

        .search-wrap { position: relative; display: flex; align-items: center; }
        .search-wrap svg { position: absolute; left: 10px; color: var(--text-dim); pointer-events: none; }
        #searchInput {
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-hi); font-family: var(--sans); font-size: 13px;
            padding: 7px 12px 7px 32px; border-radius: 7px; width: 190px;
            outline: none; transition: border-color .2s;
        }
        #searchInput:focus { border-color: var(--accent); }
        #searchInput::placeholder { color: var(--text-dim); }

        .btn-ghost {
            font-family: var(--sans); font-size: 13px; font-weight: 500;
            color: var(--text-mid); background: transparent;
            padding: 7px 13px; border-radius: 7px;
            border: 1px solid var(--border); cursor: pointer;
            transition: all .2s; text-decoration: none; white-space: nowrap;
        }
        .btn-ghost:hover { color: var(--accent); border-color: var(--accent); }

        .btn-danger-ghost {
            font-family: var(--sans); font-size: 13px; font-weight: 500;
            color: var(--text-dim); background: transparent;
            padding: 7px 13px; border-radius: 7px;
            border: 1px solid var(--border); cursor: pointer;
            transition: all .2s; white-space: nowrap;
        }
        .btn-danger-ghost:hover { color: var(--danger); border-color: var(--danger); background: rgba(255,60,90,.06); }

        .btn-new {
            font-family: var(--sans); font-size: 13px; font-weight: 700;
            color: #080a0f; background: var(--accent);
            padding: 7px 18px; border-radius: 7px; border: none;
            cursor: pointer; transition: all .2s; white-space: nowrap;
        }
        .btn-new:hover { background: #00eed0; transform: translateY(-1px); }

        /* ── Filter Tabs ─────────────────────────────────────────── */
        .filter-bar {
            position: relative; z-index: 1;
            display: flex; align-items: center; gap: 2px;
            padding: 14px 28px 0;
            border-bottom: 1px solid var(--border);
            background: rgba(8,10,15,.6);
            overflow-x: auto; scrollbar-width: none;
        }
        .filter-bar::-webkit-scrollbar { display: none; }

        .filter-tab {
            font-family: var(--mono); font-size: 11px; font-weight: 700;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text-dim); background: none;
            border: none; cursor: pointer;
            padding: 8px 14px; border-radius: 6px 6px 0 0;
            border-bottom: 2px solid transparent;
            white-space: nowrap; transition: all .2s;
        }
        .filter-tab:hover { color: var(--text-mid); }
        .filter-tab.active { color: var(--accent); border-bottom-color: var(--accent); }

        .cnt {
            display: inline-block; border-radius: 4px;
            padding: 1px 6px; margin-left: 5px; font-size: 10px;
        }

        /* Per-tab accent colours */
        .filter-tab.active              .cnt,
        .filter-tab[data-f="All"]       .cnt { background: rgba(0,210,180,.12); color: var(--accent); }
        .filter-tab[data-f="Active"]    .cnt { background: rgba(0,210,180,.12); color: var(--accent); }
        .filter-tab[data-f="Upcoming"]  .cnt { background: rgba(80,120,255,.12);color: var(--accent2); }
        .filter-tab[data-f="Started"]   .cnt { background: rgba(251,146,60,.12);color: var(--orange); }
        .filter-tab[data-f="Complete"]  .cnt { background: rgba(0,232,150,.12); color: var(--success); }

        .filter-tab.active[data-f="Active"]    { color: var(--accent);  border-bottom-color: var(--accent); }
        .filter-tab.active[data-f="Upcoming"]  { color: var(--accent2); border-bottom-color: var(--accent2); }
        .filter-tab.active[data-f="Started"]   { color: var(--orange);  border-bottom-color: var(--orange); }
        .filter-tab.active[data-f="Complete"]  { color: var(--success); border-bottom-color: var(--success); }

        /* ── Page ────────────────────────────────────────────────── */
        .page { position: relative; z-index: 1; margin: 0 auto; padding: 28px 24px 80px; }
        .task-list { display: flex; flex-direction: column; gap: 8px; }

        /* ── Task Card ───────────────────────────────────────────── */
        .task-item {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 10px; overflow: hidden; transition: border-color .2s;
        }
        .task-item:hover { border-color: rgba(0,210,180,.18); }

        /* Left border by status */
        .task-item.Active     { border-left: 3px solid var(--accent); }
        .task-item.Upcoming   { border-left: 3px solid var(--accent2); }
        .task-item.Started    { border-left: 3px solid var(--orange); }
        .task-item.Complete   { border-left: 3px solid var(--success); }
		
        .task-header {
            display: grid;
            grid-template-columns: 18px 1fr 90px 95px 100px 250px;
            align-items: center; gap: 10px;
            padding: 14px 18px; cursor: pointer; transition: background .15s;
        }
        .task-header:hover { background: rgba(255,255,255,.02); }

        .task-arrow { font-size: 10px; color: var(--text-dim); transition: transform .2s; user-select: none; }
        .task-item.active .task-arrow { transform: rotate(90deg); color: var(--accent); }

        .task-title { font-size: 14px; font-weight: 600; color: var(--text-hi);
            white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
            cursor: default; }
        .task-title[title]:hover::after {
            content: attr(title);
            position: absolute; left: 48px; top: 100%;
            background: var(--card); border: 1px solid var(--border);
            color: var(--text-hi); font-size: 12px; font-weight: 400;
            padding: 8px 12px; border-radius: 8px; z-index: 100;
            max-width: 500px; white-space: normal; line-height: 1.5;
            box-shadow: 0 8px 24px rgba(0,0,0,.5);
        }
        .task-header { position: relative; }
        .task-type  { font-family: var(--mono); font-size: 10px;
            color: var(--text-dim); text-transform: uppercase; }

        /* Badges */
        .badge { display: inline-block; padding: 3px 9px; border-radius: 5px;
            font-family: var(--mono); font-size: 10px; font-weight: 700;
            letter-spacing: .5px; text-align: center; }
        .badge-active     { background: rgba(0,210,180,.12);  color: var(--accent); }
        .badge-upcoming   { background: rgba(80,120,255,.12); color: var(--accent2); }
        .badge-started    { background: rgba(251,146,60,.12); color: var(--orange); }
        .badge-complete   { background: rgba(0,232,150,.12);  color: var(--success); }
        .badge-expired    { background: rgba(255,60,90,.12);  color: var(--danger); }
        .badge-ignore     { background: rgba(58,64,96,.2);    color: var(--text-dim); }
        .badge-incomplete { background: rgba(167,139,250,.12);color: var(--purple); }

        /* Action buttons */
        .task-actions { display: flex; gap: 5px; justify-content: flex-end; }
        .act-btn {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; border-radius: 6px;
            text-decoration: none; font-size: 13px; transition: all .15s;
            cursor: pointer; border: none; background: none;
        }
        .act-done    { background: rgba(0,232,150,.1);  color: var(--success); }
        .act-ignore  { background: rgba(58,64,96,.2);   color: var(--text-dim); }
        .act-restore { background: rgba(0,210,180,.1);  color: var(--accent); font-size: 14px; }
        .act-delete  { background: rgba(255,60,90,.08); color: var(--danger); font-size: 12px; }
        .act-btn:hover { transform: translateY(-1px); filter: brightness(1.4); }

        .task-date { font-family: var(--mono); font-size: 10.5px; color: var(--text-mid); text-align: right; white-space: nowrap; line-height: 1.4; }

        /* ── Drawer ──────────────────────────────────────────────── */
        .task-details { max-height: 0; overflow: hidden; transition: max-height .3s ease; background: rgba(0,0,0,.25); }
        .task-item.active .task-details { max-height: 600px; border-top: 1px solid var(--border); }
        .task-details-inner { padding: 18px 22px; }
        .detail-meta { display: flex; gap: 22px; margin-bottom: 12px; flex-wrap: wrap; }
        .detail-meta-item { font-family: var(--mono); font-size: 11px; }
        .detail-meta-item .k { color: var(--text-dim); margin-right: 6px; }
        .detail-meta-item .v { color: var(--text-mid); }
        .desc-content { font-size: 13px; line-height: 1.75; color: var(--text-mid); white-space: pre-wrap; }
        .desc-content a { color: var(--accent); }
        .desc-empty { font-family: var(--mono); font-size: 12px; color: var(--text-dim); }

        /* ── Modal ───────────────────────────────────────────────── */
        .modal-overlay {
            position: fixed; inset: 0; background: rgba(0,0,0,.85);
            backdrop-filter: blur(8px); display: none;
            justify-content: center; align-items: center; z-index: 500;
        }
        .modal-card {
            background: var(--card); border: 1px solid var(--border);
            border-radius: 16px; padding: 28px; width: 95%; max-width: 860px;
            box-shadow: 0 40px 80px rgba(0,0,0,.6);
        }
        .modal-body {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
            align-items: start;
        }
        .modal-desc textarea {
            height: 100%;
            min-height: 260px;
            resize: vertical;
            box-sizing: border-box;
        }
        .modal-title { font-family: var(--mono); font-size: 12px;
            letter-spacing: 2px; text-transform: uppercase;
            color: var(--accent); margin-bottom: 20px; }
        .form-group { margin-bottom: 13px; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        label { display: block; font-family: var(--mono); font-size: 10px;
            letter-spacing: 1.5px; text-transform: uppercase;
            color: var(--text-dim); margin-bottom: 5px; }
        input[type="text"], input[type="datetime-local"], select, textarea {
            width: 100%; padding: 10px 12px;
            background: var(--surface); border: 1px solid var(--border);
            color: var(--text-hi); border-radius: 7px;
            font-family: var(--sans); font-size: 13px;
            outline: none; transition: border-color .2s;
        }
        input:focus, select:focus, textarea:focus { border-color: var(--accent); }
        select option { background: var(--surface); }
        .modal-actions { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }
        .btn-submit {
            width: 100%; padding: 13px; background: var(--accent); color: #080a0f;
            font-family: var(--sans); font-size: 14px; font-weight: 700;
            border: none; border-radius: 8px; cursor: pointer; transition: all .2s;
        }
        .btn-submit:hover { background: #00eed0; }
        .btn-discard { width: 100%; background: none; border: none;
            color: var(--text-dim); font-family: var(--sans); font-size: 13px;
            cursor: pointer; padding: 8px; transition: color .2s; }
        .btn-discard:hover { color: var(--text-mid); }

        .footer { text-align: center; padding: 40px 0 0;
            font-family: var(--mono); font-size: 11px;
            color: var(--text-dim); letter-spacing: 1px; }
    </style>
</head>
<body>

    <nav class="topbar">
        <a href="/app.html" class="logo">W<span>-</span>STUDIO</a>
        <div class="topbar-sep"></div>
        <span class="page-label">Todo LM</span>
        <div class="topbar-right">
            <span class="stat-chip expired" id="chip-expired" title="Expired tasks">⏱ <span class="chip-n" id="chip-n-expired">…</span> Expired</span>
            <span class="stat-chip ignored" id="chip-ignored" title="Ignored tasks">✖ <span class="chip-n" id="chip-n-ignored">…</span> Ignored</span>
            <div class="search-wrap">
                <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                    <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
                </svg>
                <input type="text" id="searchInput" placeholder="Search tasks…" oninput="applyFilter()">
            </div>
            <a href="/outdated" class="btn-ghost">Expired</a>
            <a href="/archive" class="btn-ghost">Archive</a>
            <button class="btn-danger-ghost"
                onclick="if(confirm('Clear all tasks except expired ones? This cannot be undone.')) window.location='/clear'">
                ✕ Clear All
            </button>
            <button class="btn-new" onclick="openModal()">+ NEW TASK</button>
        </div>
    </nav>

    <!-- Filter Tabs -->
    <div class="filter-bar">
        <button class="filter-tab active" data-f="All"        onclick="setFilter('All',this)">All            <span class="cnt" id="cnt-All">0</span></button>
        <button class="filter-tab"        data-f="Active"     onclick="setFilter('Active',this)">Active       <span class="cnt" id="cnt-Active">0</span></button>
        <button class="filter-tab"        data-f="Upcoming"   onclick="setFilter('Upcoming',this)">Upcoming   <span class="cnt" id="cnt-Upcoming">0</span></button>
        <button class="filter-tab"        data-f="Started"    onclick="setFilter('Started',this)">Started     <span class="cnt" id="cnt-Started">0</span></button>
        <button class="filter-tab"        data-f="Complete"   onclick="setFilter('Complete',this)">Complete   <span class="cnt" id="cnt-Complete">0</span></button>
    </div>

    <div class="page">
        <div class="task-list" id="taskList">
            {{CONTENT}}
        </div>
        <div class="footer">© 2026 YP Creation Studio &nbsp;·&nbsp; W-Studio v1.0.0 Engine &nbsp;·&nbsp; Todo LM v1.0</div>
    </div>

    <!-- Modal -->
    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-card">
            <div class="modal-title">Create New Task</div>
            <form action="program.html" method="GET">
                <div class="modal-body">
                <div class="modal-left">
                <div class="form-group">
                    <label>Task Title</label>
                    <input type="text" name="title" placeholder="What needs to be done?" required>
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <div style="position:relative">
					  <input type="text" id="catSearch" placeholder="Search category…"
						oninput="filterCat(this.value)"
						style="width:100%;padding:10px 12px;background:var(--surface);
							   border:1px solid var(--border);color:var(--text-hi);
							   border-radius:7px;font-family:var(--sans);font-size:13px;
							   outline:none;margin-bottom:4px"
						onfocus="document.getElementById('catDrop').style.display='block'"
						onblur="setTimeout(()=>document.getElementById('catDrop').style.display='none',200)">
					  <input type="hidden" name="type" id="catValue" value="Meeting">

					  <div id="catDrop"
						style="display:none;position:absolute;z-index:999;width:100%;
							   max-height:50vh;overflow-y:auto;background:var(--surface);
							   border:1px solid var(--border);border-radius:7px;top:44px">
					  </div>
					</div>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Start Date &amp; Time</label>
                        <input type="datetime-local" name="start_dt" required>
                    </div>
                    <div class="form-group">
                        <label>End Date (optional)</label>
                        <input type="datetime-local" name="end_dt">
                    </div>
                </div>
                </div><!-- /.modal-left -->
                <div class="modal-desc">
                    <label>Description / Notes</label>
                    <textarea name="desc" placeholder="Add details, links, context…

Links, references, anything useful…"></textarea>
                </div><!-- /.modal-desc -->
                </div><!-- /.modal-body -->
                <input type="hidden" name="sid" id="taskID">
                <div class="modal-actions">
                    <button type="submit" class="btn-submit">SAVE TASK</button>
                    <button type="button" class="btn-discard" onclick="closeModal()">Discard</button>
                </div>
            </form>
        </div>
    </div>

    <script>
		const CAT = [
		  {g:"🎓 Academic & Study",    i:["Lecture","Tutorial","Assignment","Essay","Report","Exam","Quiz","Presentation","Lab Work","Field Work","Thesis","Research Paper","Study Session","Group Study","Revision"]},
		  {g:"💼 Work & Professional", i:["Meeting","Client Call","Team Standup","Review","Interview","Training","Workshop","Conference","Deadline","Proposal","Audit","Business Trip"]},
		  {g:"💻 Development & Tech",  i:["Development","Bug Fix","Code Review","Testing","Deployment","Design","Architecture","Database","DevOps","Security Audit","API Integration","Documentation"]},
		  {g:"🔬 Research & Analysis", i:["Research","Data Analysis","Literature Review","Survey","Experiment","Case Study","Market Research","Competitor Analysis"]},
		  {g:"🎨 Creative & Design",   i:["Brainstorming","Wireframing","Prototyping","UI Design","Content Writing","Editing","Photography","Video Editing","Graphic Design"]},
		  {g:"🏥 Health & Wellness",   i:["Doctor Appointment","Medication","Workout","Therapy Session","Health Checkup","Diet Plan"]},
		  {g:"🏠 Personal & Life",     i:["Errand","Shopping","Bill Payment","Event","Travel","Appointment","Family","Social","Hobby","Volunteering"]},
		  {g:"📦 Project & Planning",  i:["Project","Planning","Goal Setting","Milestone","Follow-up","Review & Reflect","Other"]}
		];

		function renderCat(q){
		  const drop = document.getElementById('catDrop');
		  drop.innerHTML = '';
		  CAT.forEach(({g,i})=>{
			const items = q ? i.filter(x=>x.toLowerCase().includes(q.toLowerCase())) : i;
			if(!items.length) return;
			const grp = document.createElement('div');
			grp.style.cssText='padding:6px 10px 2px;font-size:10px;color:var(--text-dim);font-family:var(--mono);letter-spacing:1px;text-transform:uppercase;border-top:1px solid var(--border)';
			grp.textContent = g;
			drop.appendChild(grp);
			items.forEach(name=>{
			  const el = document.createElement('div');
			  el.textContent = name;
			  el.style.cssText='padding:8px 14px;font-size:13px;cursor:pointer;color:var(--text-hi)';
			  el.onmouseenter=()=>el.style.background='rgba(0,210,180,.08)';
			  el.onmouseleave=()=>el.style.background='';
			  el.onmousedown=()=>{
				document.getElementById('catValue').value=name;
				document.getElementById('catSearch').value=name;
				document.getElementById('catDrop').style.display='none';
			  };
			  drop.appendChild(el);
			});
		  });
		}

		function filterCat(q){ renderCat(q); document.getElementById('catDrop').style.display='block'; }
		document.getElementById('catSearch').addEventListener('focus',()=>renderCat(''));
		
		
	
        // JS-side redirect: fetch the action, then redirect from here (not server)
        function doAction(url, redirect) {
            fetch(url).then(() => { window.location.href = redirect; })
                      .catch(() => { window.location.href = redirect; });
        }

        let activeFilter = 'All';

        function setFilter(f, btn) {
            activeFilter = f;
            document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            applyFilter();
        }

        // Auto-activate tab from URL ?tab=XXX
        function activateTabFromUrl() {
            const tab = new URLSearchParams(window.location.search).get('tab');
            if (tab) {
                const btn = document.querySelector(`.filter-tab[data-f="${tab}"]`);
                if (btn) setFilter(tab, btn);
            }
        }

        function applyFilter() {
            const q = document.getElementById('searchInput').value.toLowerCase().trim();
            const items = document.querySelectorAll('.task-item[data-status]');
            let shown = 0;
            items.forEach(item => {
                const status = item.dataset.status;
                const title  = (item.querySelector('.task-title')?.textContent || '').toLowerCase();
                const matchF = activeFilter === 'All' || status === activeFilter;
                const matchS = !q || title.includes(q);
                const show   = matchF && matchS;
                item.style.display = show ? '' : 'none';
                if (show) shown++;
            });
            const list = document.getElementById('taskList');
            const existing = list.querySelector('.js-empty');
            if (shown === 0 && !existing) {
                const el = document.createElement('div');
                el.className = 'js-empty';
                el.style.cssText = 'text-align:center;padding:60px 20px;color:#3a4060;font-family:monospace;';
                el.innerHTML = '<div style="font-size:32px;margin-bottom:12px;">◈</div><p>No tasks match this filter.</p>';
                list.appendChild(el);
            } else if (shown > 0 && existing) {
                existing.remove();
            }
        }

        function updateCounts() {
            const counts = {All:0, Active:0, Upcoming:0, Started:0, Complete:0};
            document.querySelectorAll('.task-item[data-status]').forEach(i => {
                counts.All++;
                const s = i.dataset.status;
                if (counts[s] !== undefined) counts[s]++;
            });
            Object.entries(counts).forEach(([k,v]) => {
                const el = document.getElementById('cnt-'+k);
                if (el) el.textContent = v;
            });
        }

        // Add tooltip for long titles
        function initTitleTooltips() {
            document.querySelectorAll('.task-title').forEach(el => {
                if (el.scrollWidth > el.clientWidth) {
                    el.setAttribute('title', el.textContent.trim());
                }
            });
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Linkify descriptions
            document.querySelectorAll('.desc-content').forEach(div => {
                div.innerHTML = div.innerText.replace(
                    /(\b(https?|ftp):\/\/[-A-Z0-9+&@#\/%?=~_|!:,.;]*[-A-Z0-9+&@#\/%=~_|])/ig,
                    '<a href="$1" target="_blank">$1</a>');
            });
            // Accordion
            document.querySelectorAll('.task-header').forEach(h => {
                h.addEventListener('click', e => {
                    if (e.target.closest('.task-actions')) return;
                    h.parentElement.classList.toggle('active');
                });
            });
            updateCounts();
            initTitleTooltips();
            activateTabFromUrl();
            applyFilter();
        });

        function openModal() {
            document.getElementById('modalOverlay').style.display = 'flex';
            document.getElementById('taskID').value = 'XP-' + Date.now();
        }
        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }
        window.addEventListener('click', e => {
            if (e.target === document.getElementById('modalOverlay')) closeModal();
        });

        // Fetch expired + ignored counts for topbar chips
        function fetchStats() {
            fetch('/stats').then(r => r.json()).then(d => {
                document.getElementById('chip-n-expired').textContent = d.expired  ?? 0;
                document.getElementById('chip-n-ignored').textContent = d.ignore   ?? 0;
            }).catch(() => {
                document.getElementById('chip-n-expired').textContent = '—';
                document.getElementById('chip-n-ignored').textContent = '—';
            });
        }
        fetchStats();
    </script>
</body>
</html>
